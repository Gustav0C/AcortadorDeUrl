name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Permite ejecutar manualmente

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run tests (if present)
        run: npm test --if-present
        
      - name: Build static files
        run: |
          # Ejecutar nuestro script de build personalizado
          npm run build
          
          # Verificar que los archivos fueron generados
          echo "📁 Files in _site directory:"
          ls -la _site/
          
          # Verificar contenido de archivos críticos
          echo "📄 Checking index.html exists:"
          test -f _site/index.html && echo "✅ index.html found" || echo "❌ index.html missing"
          
          echo "📄 Checking script.js exists:"
          test -f _site/script.js && echo "✅ script.js found" || echo "❌ script.js missing"
          
          echo "📄 Checking styles.css exists:"
          test -f _site/styles.css && echo "✅ styles.css found" || echo "❌ styles.css missing"
          
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
